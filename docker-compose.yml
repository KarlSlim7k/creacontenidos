services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?falta POSTGRES_PASSWORD (definila en .env)}
      POSTGRES_DB: ${POSTGRES_DB:-crea_command_center}
    volumes:
      - crea_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crea} -d ${POSTGRES_DB:-crea_command_center}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    # Local dev: copiar apps/api/.env.example a apps/api/.env. En prod (Dokploy) ese
    # archivo no existe (gitignored) — required:false evita que tumbe el deploy, y
    # los secrets reales se inyectan abajo desde el .env de Dokploy (mismo patrón que POSTGRES_*).
    env_file:
      - path: apps/api/.env
        required: false
    environment:
      # Sobrescribe DATABASE_URL para apuntar al servicio db (no localhost).
      DATABASE_URL: postgres://${POSTGRES_USER:-crea}:${POSTGRES_PASSWORD:?falta POSTGRES_PASSWORD (definila en .env)}@db:5432/${POSTGRES_DB:-crea_command_center}
      PORT: 3000
      NODE_ENV: production
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_AUDIENCE_ID: ${RESEND_AUDIENCE_ID:-}
      RESEND_FROM: ${RESEND_FROM:-Buenos días, Perote <hola@crea-contenidos.com>}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-contacto@crea-contenidos.com}
      COMUNIDAD_EMAIL: ${COMUNIDAD_EMAIL:-comunidad@crea-contenidos.com}
      NOUS_PORTAL_API_KEY: ${NOUS_PORTAL_API_KEY:-}
      AI_MODEL_DEFAULT: ${AI_MODEL_DEFAULT:-deepseek/deepseek-v4-flash}
      AI_MODEL_COMPLEX: ${AI_MODEL_COMPLEX:-minimax/minimax-m3}
      AI_MODEL_QA: ${AI_MODEL_QA:-openai/gpt-5-nano}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_MODEL_IMAGE: ${AI_MODEL_IMAGE:-google/gemini-3-pro-image}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://crea-contenidos.com}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      WORDPRESS_URL: ${WORDPRESS_URL:-}
      WORDPRESS_USER: ${WORDPRESS_USER:-}
      WORDPRESS_APP_PASSWORD: ${WORDPRESS_APP_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET (definila en .env)}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      # Microservicio de scraping de Facebook (apps/competitor-scraper/).
      # Si está vacío, /api/listening/competitors/detect cae a Perplexity-only.
      COMPETITOR_SCRAPER_URL: ${COMPETITOR_SCRAPER_URL:-}
    ports:
      # Host 3001: el 3000 lo ocupa el dashboard de Dokploy en el VPS.
      - "${API_HOST_PORT:-3001}:3000"
    healthcheck:
      # node:22 trae fetch global; el puerto interno siempre es 3000.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      # Si el scraper está configurado, esperar a que esté healthy antes de
      # levantar la API (evita race condition en el primer boot).
      competitor-scraper:
        condition: service_healthy
        required: false

  # Microservicio de scraping de Facebook con Playwright + Chromium.
  # Self-hosted en la red interna de Dokploy (no expuesto al público).
  # Detalle: apps/competitor-scraper/README.md
  competitor-scraper:
    build:
      context: ./apps/competitor-scraper
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3015
      FB_COOKIES_FILE: /secrets/fb_cookies.txt
    volumes:
      # FB_COOKIES_PATH apunta fuera del árbol del compose (default: ./secrets/
      # para dev local). En Dokploy, el deploy hace git clean de no-trackeados
      # y se lleva ./secrets/ con él — por eso en prod FB_COOKIES_PATH debe
      # apuntar a una ruta fuera del repo (ej. /home/karol/creacontenidos-work/
      # secrets/fb_cookies.txt), seteada en el .env de Dokploy. Si el archivo
      # no existe, el servicio arranca igual pero solo scrapea páginas públicas.
      - ${FB_COOKIES_PATH:-./secrets/fb_cookies.txt}:/secrets/fb_cookies.txt:ro
    expose:
      - "3015"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3015/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # El pico real está al lanzar Chromium, no en steady-state: se midió un
    # pico de ~1010 MB (con 1024m de límite, dejaba solo 14 MB de margen —
    # riesgo real de OOM-kill del kernel, no solo el warning de Crawlee).
    mem_limit: 1536m

volumes:
  crea_db_data:
